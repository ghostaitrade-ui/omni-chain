services:
  - type: web
    name: omni-chain
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT --timeout 600
    envVars:
      - key: FINNHUB_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: POLYGON_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_ENGINE_ID
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
